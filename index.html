<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurpleSchool</title>
    <link rel="stylesheet" href="./css/main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body class="container-bg-primary">
    <section>
        <div class="container">
            <header class="header">
                <img src="./img/logo.svg" alt="logo" class="header_logo">
                <nav>
                    <ul class="header__nav">
                        <li><button class="header__btn">Курсы</button></li>
                        <li><a href="#">О школе</a></li>
                        <li><a href="#">Блог</a></li>
                        <li><a href="#">База знаний</a></li>
                    </ul>
                </nav>
                <div class="header__auth">
                    <img src="./img/user-icon.svg" alt="user icon">
                    <a href="#">Вход</a>
                </div>
            </header>
            <div class="container hero">
                <div>
                    <p class="hero-title">Доступные курсы по<br/><span class="title__gradient">Разработке и DevOps</span></p>
                    <div class="hero__btns">
                        <button class="bg-purple">Выбрать курс</button>
                        <button>О школе</button>
                    </div>
                </div>
                <div>
                    <img src="./img/mentor.png " alt="mentor" class="hero__img">
                </div>
            </div>
        </div>
    </section>
    <section class="container-bg-standard">
        <div class="container">
            <div class="catalog">
                <p>Выбрать курс</p>
                <h1>Каталог курсов</h1>
                <ul>
                    <li><button class="bg-purple">Все</button></li>
                    <li><button>Frontend</button></li>
                    <li><button>Backend</button></li>
                    <li><button>DevOps</button></li>
                    <li><button>Soft Skills</button></li>
                </ul>
                <div class="catalog__cards">
                    <div class="card">
                        <img src="img/preview.png" alt="preview">
                        <div class="m-24">
                            <h3>React + Next.js - с нуля</h3>
                            <p>Антон Ларичев</p>
                            <div class="d-flex">
                                <img src="" alt="icon cloak">
                                <p>18 часов лекций</p>
                            </div>
                            <div>
                                <button>4.9</button>
                                <button>Frontend</button>
                            </div>
                        </div>
                        <div>
                            <p> от 1890 ₽</p>
                            <button>Подробнее</button>
                        </div>
                    </div>        
                </div>
            </div>
        </div>

    </section>

    
</body>
</html>
